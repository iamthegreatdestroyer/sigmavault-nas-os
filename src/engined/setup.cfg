[flake8]
max-line-length = 100
extend-ignore =
    # E203: whitespace before ':' — conflicts with black slice formatting
    E203,
    # W503: line break before binary operator — conflicts with black
    W503,
    # F824: global statement with no assignment — valid pattern for lazy init
    F824,
    # E402: module level import not at top — test files with sys.path setup
    E402,
    # E501: line too long — black handles formatting, allow occasional overruns
    E501,
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    *.egg-info,
    build,
    dist,
    migrations,
    engined/rpc/system_pb2.py,
    engined/rpc/system_pb2_grpc.py,
